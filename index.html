<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Merger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --border: #2a2e3b;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --accent: #6c8aff;
      --accent-hover: #8da4ff;
      --danger: #ff6b6b;
      --success: #51cf66;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.25rem;
    }

    h1 { font-size: 1.8rem; font-weight: 700; }

    .lang-switcher {
      display: flex;
      gap: 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn:hover { color: var(--text); }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 860px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
    }

    .drop-zone.compact {
      padding: 1rem 1.5rem;
    }

    .drop-zone.compact .drop-zone-icon { display: none; }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-hover);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.7;
    }

    .drop-zone-text {
      font-size: 1rem;
      color: var(--text-muted);
    }

    .drop-zone-text strong { color: var(--accent); }

    .limits {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .drop-zone.compact .limits { margin-top: 0.25rem; }

    #file-input { display: none; }

    /* Source file pills */
    .source-files {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .source-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.5rem 0.35rem 0.75rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      max-width: 220px;
    }

    .source-pill-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-pill-pages {
      flex-shrink: 0;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .source-pill-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 0.15rem;
      border-radius: 50%;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .source-pill-remove:hover { color: var(--danger); }

    /* Page grid */
    .page-grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .page-grid-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.75rem;
    }

    .page-card {
      position: relative;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.15s, opacity 0.15s, transform 0.15s;
      user-select: none;
    }

    .page-card:hover { border-color: var(--accent); }

    .page-card.dragging {
      opacity: 0.3;
      transform: scale(0.95);
    }

    .page-card.drag-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(108, 138, 255, 0.3);
    }

    .page-thumb {
      width: 100%;
      aspect-ratio: 210 / 297;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      overflow: hidden;
    }

    .page-thumb canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .page-thumb-loading {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .page-label {
      padding: 0.4rem 0.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .page-label-num {
      font-weight: 600;
      color: var(--text);
    }

    .page-label-file {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .page-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      line-height: 1;
    }

    .page-card:hover .page-remove { opacity: 1; }
    .page-remove:hover { background: var(--danger); }

    .page-index {
      position: absolute;
      top: 4px;
      left: 4px;
      min-width: 20px;
      height: 20px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 10px;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    /* Actions */
    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
    }

    button.btn {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button.btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }

    .byline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }

    .status {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .progress-bar {
      margin-top: 0.75rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.active { display: block; }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      h1 { font-size: 1.4rem; }
      .drop-zone { padding: 1.5rem 1rem; }
      .page-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title"></h1>
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
  </div>
  <p class="subtitle" id="subtitle"></p>

  <div class="container">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-icon">+</div>
      <div class="drop-zone-text" id="drop-text"></div>
      <div class="limits" id="drop-limits"></div>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf" multiple>

    <div class="source-files" id="source-files"></div>

    <div class="page-grid-header" id="page-grid-header" style="display:none">
      <span class="page-grid-summary" id="page-grid-summary"></span>
    </div>
    <div class="page-grid" id="page-grid"></div>

    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-secondary" id="clear-btn"></button>
      <button class="btn btn-primary" id="merge-btn" disabled></button>
    </div>
    <p class="byline" id="byline" style="display:none">by Fabio M</p>

    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const MAX_FILES = 10;
    const MAX_SIZE_BYTES = 25 * 1024 * 1024;
    const THUMB_WIDTH = 200;

    const i18n = {
      en: {
        title: 'PDF Merger',
        subtitle: 'Merge multiple PDFs in your browser. Nothing is uploaded.',
        dropText: '<strong>Click to select</strong> or drag & drop PDFs here',
        dropTextCompact: '<strong>Add more PDFs</strong>',
        limits: 'Max 10 files, 25 MB each',
        clearAll: 'Clear All',
        mergePdfs: 'Merge PDFs',
        remove: 'Remove',
        removePage: 'Remove page',
        removeFile: 'Remove file',
        loading: 'Loading...',
        page: 'page',
        pages: 'pages',
        pageNum: (n) => `Page ${n}`,
        unknownPages: 'unknown pages',
        skippedNotPdf: 'Some files were skipped (not PDFs).',
        maxFiles: `Maximum ${MAX_FILES} files allowed.`,
        exceedsSize: (name) => `"${name}" exceeds 25 MB limit and was skipped.`,
        merging: 'Merging...',
        processing: (i, total) => `Processing page ${i} of ${total}...`,
        generating: 'Generating merged PDF...',
        loadFailed: (name) => `Failed to load "${name}". It may be encrypted or corrupted.`,
        mergeFailed: 'Failed to merge PDFs.',
        mergeSuccess: (pages, size) => `Merged ${pages} ${pages !== 1 ? 'pages' : 'page'} (${size}).`,
        pagesFromFiles: (p, f) => `${p} ${p !== 1 ? 'pages' : 'page'} from ${f} ${f !== 1 ? 'files' : 'file'}`,
        dragToReorder: 'Drag to reorder',
      },
      it: {
        title: 'Unisci PDF',
        subtitle: 'Unisci più PDF nel tuo browser. Nessun file viene caricato.',
        dropText: '<strong>Clicca per selezionare</strong> o trascina i PDF qui',
        dropTextCompact: '<strong>Aggiungi altri PDF</strong>',
        limits: 'Max 10 file, 25 MB ciascuno',
        clearAll: 'Rimuovi Tutti',
        mergePdfs: 'Unisci PDF',
        remove: 'Rimuovi',
        removePage: 'Rimuovi pagina',
        removeFile: 'Rimuovi file',
        loading: 'Caricamento...',
        page: 'pagina',
        pages: 'pagine',
        pageNum: (n) => `Pagina ${n}`,
        unknownPages: 'pagine sconosciute',
        skippedNotPdf: 'Alcuni file sono stati ignorati (non sono PDF).',
        maxFiles: `Massimo ${MAX_FILES} file consentiti.`,
        exceedsSize: (name) => `"${name}" supera il limite di 25 MB ed è stato ignorato.`,
        merging: 'Unione in corso...',
        processing: (i, total) => `Elaborazione pagina ${i} di ${total}...`,
        generating: 'Generazione del PDF unito...',
        loadFailed: (name) => `Impossibile caricare "${name}". Potrebbe essere crittografato o corrotto.`,
        mergeFailed: 'Impossibile unire i PDF.',
        mergeSuccess: (pages, size) => `${pages !== 1 ? 'Unite' : 'Unita'} ${pages} ${pages !== 1 ? 'pagine' : 'pagina'} (${size}).`,
        pagesFromFiles: (p, f) => `${p} ${p !== 1 ? 'pagine' : 'pagina'} da ${f} file`,
        dragToReorder: 'Trascina per riordinare',
      },
    };

    let lang = localStorage.getItem('pdf-merger-lang') || (navigator.language.startsWith('it') ? 'it' : 'en');

    function t(key, ...args) {
      const val = i18n[lang][key];
      return typeof val === 'function' ? val(...args) : val;
    }

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem('pdf-merger-lang', lang);
      document.documentElement.lang = lang;
      document.title = t('title');
      applyTranslations();
      renderPageGrid();
      renderSourcePills();
    }

    function applyTranslations() {
      document.getElementById('title').textContent = t('title');
      document.getElementById('subtitle').textContent = t('subtitle');
      const hasPages = pages.length > 0;
      document.getElementById('drop-text').innerHTML = hasPages ? t('dropTextCompact') : t('dropText');
      document.getElementById('drop-limits').textContent = t('limits');
      document.getElementById('clear-btn').textContent = t('clearAll');
      document.getElementById('merge-btn').textContent = t('mergePdfs');
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    document.getElementById('lang-switcher').addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (btn) setLang(btn.dataset.lang);
    });

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const pageGrid = document.getElementById('page-grid');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const actionsEl = document.getElementById('actions');
    const bylineEl = document.getElementById('byline');

    let sourceFiles = [];
    let pages = [];
    let dragSrcIndex = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
      handleFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });

    async function handleFiles(files) {
      clearStatus();
      const pdfs = files.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));

      if (pdfs.length < files.length) {
        showStatus(t('skippedNotPdf'), 'error');
      }

      const currentFileCount = new Set(sourceFiles.map((_, i) => i).filter(i => pages.some(p => p.sourceIdx === i))).size;

      for (const file of pdfs) {
        if (sourceFiles.length >= MAX_FILES) {
          showStatus(t('maxFiles'), 'error');
          break;
        }
        if (file.size > MAX_SIZE_BYTES) {
          showStatus(t('exceedsSize', file.name), 'error');
          continue;
        }

        try {
          const buffer = await file.arrayBuffer();
          const sourceIdx = sourceFiles.length;
          sourceFiles.push({ file, buffer, pageCount: 0 });

          const pdfDoc = await pdfjsLib.getDocument({ data: buffer.slice(0) }).promise;
          const pageCount = pdfDoc.numPages;
          sourceFiles[sourceIdx].pageCount = pageCount;

          for (let p = 0; p < pageCount; p++) {
            pages.push({ sourceIdx, pageNum: p, thumbCanvas: null });
          }

          renderAll();
          renderThumbnails(pdfDoc, sourceIdx, pageCount);
        } catch {
          showStatus(t('loadFailed', file.name), 'error');
        }
      }

      renderAll();
    }

    async function renderThumbnails(pdfDoc, sourceIdx, pageCount) {
      for (let p = 1; p <= pageCount; p++) {
        const page = await pdfDoc.getPage(p);
        const unscaled = page.getViewport({ scale: 1 });
        const scale = THUMB_WIDTH / unscaled.width;
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;

        const pageEntry = pages.find(pg => pg.sourceIdx === sourceIdx && pg.pageNum === p - 1 && !pg.thumbCanvas);
        if (pageEntry) {
          pageEntry.thumbCanvas = canvas;
        }

        renderPageGrid();
      }
    }

    function renderAll() {
      const hasPages = pages.length > 0;
      dropZone.classList.toggle('compact', hasPages);
      actionsEl.style.display = hasPages ? 'flex' : 'none';
      bylineEl.style.display = hasPages ? 'block' : 'none';
      document.getElementById('page-grid-header').style.display = hasPages ? 'flex' : 'none';
      mergeBtn.disabled = pages.length < 1;

      applyTranslations();
      renderSourcePills();
      renderPageGrid();
    }

    function renderSourcePills() {
      const container = document.getElementById('source-files');
      container.innerHTML = '';

      const usedSources = new Set(pages.map(p => p.sourceIdx));
      if (usedSources.size === 0) return;

      usedSources.forEach(idx => {
        const sf = sourceFiles[idx];
        const pagesInSource = pages.filter(p => p.sourceIdx === idx).length;

        const pill = document.createElement('div');
        pill.className = 'source-pill';
        pill.innerHTML = `
          <span class="source-pill-name" title="${escapeHtml(sf.file.name)}">${escapeHtml(sf.file.name)}</span>
          <span class="source-pill-pages">(${pagesInSource})</span>
          <button class="source-pill-remove" title="${t('removeFile')}">&times;</button>
        `;

        pill.querySelector('.source-pill-remove').addEventListener('click', () => {
          pages = pages.filter(p => p.sourceIdx !== idx);
          clearStatus();
          renderAll();
        });

        container.appendChild(pill);
      });
    }

    function renderPageGrid() {
      pageGrid.innerHTML = '';

      const summaryEl = document.getElementById('page-grid-summary');
      if (pages.length === 0) {
        summaryEl.textContent = '';
        mergeBtn.disabled = true;
        return;
      }

      const usedFiles = new Set(pages.map(p => p.sourceIdx)).size;
      summaryEl.textContent = t('pagesFromFiles', pages.length, usedFiles) + '  —  ' + t('dragToReorder');
      mergeBtn.disabled = false;

      pages.forEach((entry, i) => {
        const card = document.createElement('div');
        card.className = 'page-card';
        card.draggable = true;
        card.dataset.index = i;

        const sf = sourceFiles[entry.sourceIdx];

        const thumbDiv = document.createElement('div');
        thumbDiv.className = 'page-thumb';
        if (entry.thumbCanvas) {
          thumbDiv.appendChild(entry.thumbCanvas.cloneNode(true));
          const ctx = thumbDiv.querySelector('canvas').getContext('2d');
          ctx.drawImage(entry.thumbCanvas, 0, 0);
        } else {
          const span = document.createElement('span');
          span.className = 'page-thumb-loading';
          span.textContent = t('loading');
          thumbDiv.appendChild(span);
        }

        const indexBadge = document.createElement('span');
        indexBadge.className = 'page-index';
        indexBadge.textContent = i + 1;

        const removeBtn = document.createElement('button');
        removeBtn.className = 'page-remove';
        removeBtn.title = t('removePage');
        removeBtn.innerHTML = '&times;';
        removeBtn.addEventListener('click', e => {
          e.stopPropagation();
          pages.splice(i, 1);
          clearStatus();
          renderAll();
        });

        const labelDiv = document.createElement('div');
        labelDiv.className = 'page-label';
        labelDiv.innerHTML = `<span class="page-label-num">${t('pageNum', entry.pageNum + 1)}</span>
          <span class="page-label-file" title="${escapeHtml(sf.file.name)}">${escapeHtml(sf.file.name)}</span>`;

        card.appendChild(thumbDiv);
        card.appendChild(indexBadge);
        card.appendChild(removeBtn);
        card.appendChild(labelDiv);

        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragover', onDragOver);
        card.addEventListener('dragenter', onDragEnter);
        card.addEventListener('dragleave', onDragLeave);
        card.addEventListener('drop', onDrop);
        card.addEventListener('dragend', onDragEnd);

        pageGrid.appendChild(card);
      });
    }

    function onDragStart(e) {
      dragSrcIndex = parseInt(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcIndex);
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDragEnter(e) {
      e.preventDefault();
      const card = e.target.closest('.page-card');
      if (card) card.classList.add('drag-target');
    }

    function onDragLeave(e) {
      const card = e.target.closest('.page-card');
      if (card && !card.contains(e.relatedTarget)) {
        card.classList.remove('drag-target');
      }
    }

    function onDrop(e) {
      e.preventDefault();
      const card = e.target.closest('.page-card');
      if (!card) return;
      card.classList.remove('drag-target');
      const targetIndex = parseInt(card.dataset.index);
      if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
        const [moved] = pages.splice(dragSrcIndex, 1);
        pages.splice(targetIndex, 0, moved);
        renderAll();
      }
    }

    function onDragEnd() {
      dragSrcIndex = null;
      document.querySelectorAll('.page-card').forEach(el => {
        el.classList.remove('dragging', 'drag-target');
      });
    }

    clearBtn.addEventListener('click', () => {
      sourceFiles = [];
      pages = [];
      clearStatus();
      renderAll();
    });

    mergeBtn.addEventListener('click', mergePDFs);

    async function mergePDFs() {
      if (pages.length < 1) return;

      mergeBtn.disabled = true;
      clearBtn.disabled = true;
      progressBar.classList.add('active');
      progressFill.style.width = '0%';
      showStatus(t('merging'), '');

      try {
        const merged = await PDFLib.PDFDocument.create();
        const total = pages.length;

        const loadedDocs = {};
        const usedSources = [...new Set(pages.map(p => p.sourceIdx))];
        for (const idx of usedSources) {
          loadedDocs[idx] = await PDFLib.PDFDocument.load(sourceFiles[idx].buffer);
        }

        for (let i = 0; i < total; i++) {
          showStatus(t('processing', i + 1, total), '');
          progressFill.style.width = `${((i + 1) / (total + 1)) * 100}%`;

          const entry = pages[i];
          const srcDoc = loadedDocs[entry.sourceIdx];
          const [copiedPage] = await merged.copyPages(srcDoc, [entry.pageNum]);
          merged.addPage(copiedPage);
        }

        progressFill.style.width = '90%';
        showStatus(t('generating'), '');

        const mergedBytes = await merged.save();
        progressFill.style.width = '100%';

        const blob = new Blob([mergedBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 60000);

        showStatus(t('mergeSuccess', total, formatSize(mergedBytes.length)), 'success');
      } catch (err) {
        showStatus(err.message || t('mergeFailed'), 'error');
      } finally {
        mergeBtn.disabled = pages.length < 1;
        clearBtn.disabled = pages.length === 0;
        setTimeout(() => {
          progressBar.classList.remove('active');
          progressFill.style.width = '0%';
        }, 1500);
      }
    }

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    setLang(lang);
  </script>
</body>
</html>
